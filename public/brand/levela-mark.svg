<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" fill="none">
  <defs>
    <linearGradient id="levelaGlobeGradient" x1="52" y1="188" x2="188" y2="68" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5EEAD4" />
      <stop offset="0.5" stop-color="#14B8A6" />
      <stop offset="1" stop-color="#0F766E" />
    </linearGradient>
    <linearGradient id="levelaRingGradient" x1="32" y1="128" x2="224" y2="128" gradientUnits="userSpaceOnUse">
      <stop stop-color="#99F6E4" stop-opacity="0.35" />
      <stop offset="0.5" stop-color="#2DD4BF" />
      <stop offset="1" stop-color="#99F6E4" stop-opacity="0.35" />
    </linearGradient>
  </defs>

  <g transform="translate(28 30)">
    <!-- Unified orbit: one continuous ring around the planet (shared system) -->
    <ellipse
      cx="100"
      cy="104"
      rx="88"
      ry="34"
      stroke="url(#levelaRingGradient)"
      stroke-width="5"
      fill="none"
      transform="rotate(-18 100 104)"
    />

    <!-- Federation nodes on the ring — decentralized, but one network -->
    <circle cx="34" cy="88" r="6" fill="#CCFBF1" />
    <circle cx="166" cy="72" r="6" fill="#CCFBF1" />
    <circle cx="100" cy="56" r="7" fill="#FDE68A" />
    <circle cx="178" cy="118" r="5.5" fill="#99F6E4" opacity="0.9" />

    <!-- One planet -->
    <circle cx="100" cy="118" r="50" fill="url(#levelaGlobeGradient)" />
    <ellipse cx="100" cy="118" rx="50" ry="16" stroke="#FFFFFF" stroke-opacity="0.34" stroke-width="2.5" fill="none" />
    <path d="M100 68 V168" stroke="#FFFFFF" stroke-opacity="0.2" stroke-width="2.5" stroke-linecap="round" />
    <path d="M50 118 H150" stroke="#FFFFFF" stroke-opacity="0.2" stroke-width="2.5" stroke-linecap="round" />

    <!-- Meridians suggesting one woven surface, not separate parts -->
    <path
      d="M72 82 C88 118 88 154 72 190"
      stroke="#FFFFFF"
      stroke-opacity="0.16"
      stroke-width="2"
      fill="none"
    />
    <path
      d="M128 82 C112 118 112 154 128 190"
      stroke="#FFFFFF"
      stroke-opacity="0.16"
      stroke-width="2"
      fill="none"
    />
  </g>
</svg>
